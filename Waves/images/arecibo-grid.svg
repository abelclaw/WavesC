<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 750 320" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowL2" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#e63946" stroke="none"/>
    </marker>
    <marker id="arrowR2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e63946" stroke="none"/>
    </marker>
    <clipPath id="photoClip2">
      <rect x="15" y="15" width="320" height="290" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="750" height="320" fill="#f5f5f5" rx="8"/>

  <!-- === LEFT: Photo === -->
  <image href="arecibo-photo.jpg" x="15" y="15" width="320" height="290" clip-path="url(#photoClip2)" preserveAspectRatio="xMidYMid slice"/>
  <rect x="15" y="15" width="320" height="290" rx="8" fill="none" stroke="#ddd" stroke-width="1.5"/>

  <!-- Zoom circle on the grid area of the photo -->
  <circle cx="175" cy="200" r="45" fill="none" stroke="#e63946" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- Size label ON the photo -->
  <rect x="60" y="260" width="175" height="28" rx="5" fill="rgba(230,57,70,0.9)"/>
  <text x="147" y="279" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Grid spacing d ~ 10 cm</text>

  <!-- === Connector lines === -->
  <line x1="220" y1="178" x2="420" y2="50" stroke="#e63946" stroke-width="1.8" stroke-dasharray="6,3"/>
  <line x1="220" y1="222" x2="420" y2="270" stroke="#e63946" stroke-width="1.8" stroke-dasharray="6,3"/>

  <!-- === RIGHT: Zoomed-in grid === -->
  <rect x="420" y="30" width="310" height="250" rx="8" fill="#a0a0a0" stroke="#e63946" stroke-width="2.5"/>

  <!-- Metal grid bars -->
  <g>
    <!-- Horizontal bars -->
    <rect x="420" y="96" width="310" height="6" fill="#808080"/>
    <rect x="420" y="162" width="310" height="6" fill="#808080"/>
    <rect x="420" y="228" width="310" height="6" fill="#808080"/>
    <!-- Vertical bars -->
    <rect x="486" y="30" width="6" height="250" fill="#808080"/>
    <rect x="558" y="30" width="6" height="250" fill="#808080"/>
    <rect x="630" y="30" width="6" height="250" fill="#808080"/>
    <rect x="702" y="30" width="6" height="250" fill="#808080"/>
  </g>

  <!-- Sky through gaps -->
  <g fill="#87CEEB" opacity="0.4">
    <!-- Row 1 -->
    <rect x="492" y="36" width="66" height="60" rx="1"/>
    <rect x="564" y="36" width="66" height="60" rx="1"/>
    <rect x="636" y="36" width="66" height="60" rx="1"/>
    <!-- Row 2 -->
    <rect x="492" y="102" width="66" height="60" rx="1"/>
    <rect x="564" y="102" width="66" height="60" rx="1"/>
    <rect x="636" y="102" width="66" height="60" rx="1"/>
    <!-- Row 3 -->
    <rect x="492" y="168" width="66" height="60" rx="1"/>
    <rect x="564" y="168" width="66" height="60" rx="1"/>
    <rect x="636" y="168" width="66" height="60" rx="1"/>
    <!-- Row 4 -->
    <rect x="492" y="234" width="66" height="40" rx="1"/>
    <rect x="564" y="234" width="66" height="40" rx="1"/>
    <rect x="636" y="234" width="66" height="40" rx="1"/>
  </g>

  <!-- Dimension arrow: horizontal spacing -->
  <line x1="489" y1="50" x2="561" y2="50" stroke="#e63946" stroke-width="2.5" marker-start="url(#arrowL2)" marker-end="url(#arrowR2)"/>
  <line x1="489" y1="44" x2="489" y2="56" stroke="#e63946" stroke-width="1.5"/>
  <line x1="561" y1="44" x2="561" y2="56" stroke="#e63946" stroke-width="1.5"/>
  <rect x="500" y="55" width="50" height="16" rx="3" fill="#e63946"/>
  <text x="525" y="67" text-anchor="middle" font-size="10" fill="white" font-weight="bold">~10 cm</text>

  <!-- Vertical dimension -->
  <line x1="716" y1="99" x2="716" y2="165" stroke="#e63946" stroke-width="2.5" marker-start="url(#arrowL2)" marker-end="url(#arrowR2)"/>
  <line x1="710" y1="99" x2="722" y2="99" stroke="#e63946" stroke-width="1.5"/>
  <line x1="710" y1="165" x2="722" y2="165" stroke="#e63946" stroke-width="1.5"/>

  <!-- Key inequality -->
  <rect x="440" y="252" width="150" height="22" rx="4" fill="white" stroke="#e63946" stroke-width="1.5"/>
  <text x="515" y="267" text-anchor="middle" font-size="11" fill="#e63946" font-weight="700">d ~ 10 cm ≪ λ ~ 1 m</text>
</svg>