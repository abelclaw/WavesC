<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowL2" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#e63946" stroke="none"/>
    </marker>
    <marker id="arrowR2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e63946" stroke="none"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="440" height="220" fill="#f5f5f5" rx="6"/>

  <!-- Zoom-in indicator: converging lines from top -->
  <line x1="140" y1="0" x2="20" y2="30" stroke="#e63946" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="300" y1="0" x2="420" y2="30" stroke="#e63946" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="220" y="16" text-anchor="middle" font-size="11" fill="#e63946" font-weight="600" font-style="italic">zoom in on dish surface</text>

  <!-- Zoomed grid panel -->
  <rect x="20" y="30" width="400" height="150" rx="6" fill="#a0a0a0" stroke="#e63946" stroke-width="2"/>

  <!-- Metal grid bars -->
  <g>
    <!-- Horizontal bars -->
    <rect x="20" y="67" width="400" height="5" fill="#808080" rx="1"/>
    <rect x="20" y="112" width="400" height="5" fill="#808080" rx="1"/>
    <rect x="20" y="157" width="400" height="5" fill="#808080" rx="1"/>
    <!-- Vertical bars -->
    <rect x="90" y="30" width="5" height="150" fill="#808080" rx="1"/>
    <rect x="160" y="30" width="5" height="150" fill="#808080" rx="1"/>
    <rect x="230" y="30" width="5" height="150" fill="#808080" rx="1"/>
    <rect x="300" y="30" width="5" height="150" fill="#808080" rx="1"/>
    <rect x="370" y="30" width="5" height="150" fill="#808080" rx="1"/>
  </g>

  <!-- Sky through gaps -->
  <g fill="#87CEEB" opacity="0.4">
    <rect x="95" y="72" width="65" height="40" rx="1"/>
    <rect x="165" y="72" width="65" height="40" rx="1"/>
    <rect x="235" y="72" width="65" height="40" rx="1"/>
    <rect x="305" y="72" width="65" height="40" rx="1"/>
    <rect x="95" y="117" width="65" height="40" rx="1"/>
    <rect x="165" y="117" width="65" height="40" rx="1"/>
    <rect x="235" y="117" width="65" height="40" rx="1"/>
    <rect x="305" y="117" width="65" height="40" rx="1"/>
    <rect x="95" y="35" width="65" height="32" rx="1"/>
    <rect x="165" y="35" width="65" height="32" rx="1"/>
    <rect x="235" y="35" width="65" height="32" rx="1"/>
    <rect x="305" y="35" width="65" height="32" rx="1"/>
  </g>

  <!-- Dimension arrow: horizontal spacing (center to center) -->
  <line x1="92" y1="46" x2="162" y2="46" stroke="#e63946" stroke-width="2.5" marker-start="url(#arrowL2)" marker-end="url(#arrowR2)"/>
  <!-- Tick marks -->
  <line x1="92" y1="40" x2="92" y2="52" stroke="#e63946" stroke-width="1.5"/>
  <line x1="162" y1="40" x2="162" y2="52" stroke="#e63946" stroke-width="1.5"/>

  <!-- Spacing label -->
  <rect x="100" y="35" width="52" height="16" rx="3" fill="#e63946"/>
  <text x="126" y="47" text-anchor="middle" font-size="10" fill="white" font-weight="bold">~10 cm</text>

  <!-- Vertical dimension -->
  <line x1="348" y1="70" x2="348" y2="115" stroke="#e63946" stroke-width="2.5" marker-start="url(#arrowL2)" marker-end="url(#arrowR2)"/>
  <line x1="342" y1="70" x2="354" y2="70" stroke="#e63946" stroke-width="1.5"/>
  <line x1="342" y1="115" x2="354" y2="115" stroke="#e63946" stroke-width="1.5"/>
  <rect x="355" y="83" width="52" height="16" rx="3" fill="#e63946"/>
  <text x="381" y="95" text-anchor="middle" font-size="10" fill="white" font-weight="bold">d ~ 10 cm</text>

  <!-- Key inequality -->
  <rect x="50" y="187" width="150" height="24" rx="4" fill="white" stroke="#e63946" stroke-width="1.5"/>
  <text x="125" y="203" text-anchor="middle" font-size="12" fill="#e63946" font-weight="700">d ~ 10 cm ≪ λ ~ 1 m</text>

  <!-- Bottom caption -->
  <text x="320" y="203" text-anchor="middle" font-size="11" fill="#666">Grid spacing vs. radio wavelength (400 MHz)</text>
</svg>