<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <clipPath id="doorClip">
      <rect x="62" y="72" width="180" height="130" rx="4"/>
    </clipPath>
    <pattern id="meshPattern" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#1a1a1a"/>
      <circle cx="4" cy="4" r="2.2" fill="#333"/>
    </pattern>
    <pattern id="meshPatternZoom" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#2a2a2a"/>
      <circle cx="20" cy="20" r="14" fill="#555" stroke="#444" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#e63946" stroke="none"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e63946" stroke="none"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="340" fill="#f8f8f8" rx="8"/>

  <!-- === LEFT: Microwave oven === -->
  <g transform="translate(0, 10)">
    <!-- Microwave body -->
    <rect x="30" y="40" width="290" height="200" rx="12" fill="#b0b0b0" stroke="#888" stroke-width="2"/>
    <rect x="30" y="40" width="290" height="200" rx="12" fill="url(#metalGrad)" opacity="0.3"/>
    <!-- Inner cavity dark -->
    <rect x="50" y="60" width="200" height="150" rx="6" fill="#111" stroke="#666" stroke-width="1.5"/>
    <!-- Door mesh area -->
    <rect x="62" y="72" width="180" height="130" rx="4" fill="url(#meshPattern)"/>
    <!-- Glass reflection -->
    <path d="M62,72 L120,72 L62,140 Z" fill="rgba(255,255,255,0.06)"/>
    <!-- Door handle -->
    <rect x="240" y="100" width="8" height="60" rx="4" fill="#999" stroke="#777" stroke-width="1"/>
    <!-- Control panel -->
    <rect x="265" y="60" width="45" height="20" rx="3" fill="#222"/>
    <text x="287" y="74" text-anchor="middle" font-size="10" fill="#0f0" font-family="monospace">12:00</text>
    <!-- Buttons -->
    <circle cx="280" cy="100" r="5" fill="#444" stroke="#555" stroke-width="1"/>
    <circle cx="296" cy="100" r="5" fill="#444" stroke="#555" stroke-width="1"/>
    <circle cx="280" cy="118" r="5" fill="#444" stroke="#555" stroke-width="1"/>
    <circle cx="296" cy="118" r="5" fill="#444" stroke="#555" stroke-width="1"/>
    <rect x="268" y="140" width="40" height="14" rx="3" fill="#4a4" stroke="#5b5" stroke-width="1"/>
    <text x="288" y="150" text-anchor="middle" font-size="7" fill="white" font-weight="bold">START</text>

    <!-- Zoom circle on door -->
    <circle cx="152" cy="137" r="28" fill="none" stroke="#e63946" stroke-width="2.5" stroke-dasharray="4,2"/>

    <!-- Label -->
    <text x="175" y="278" text-anchor="middle" font-size="13" fill="#333" font-weight="600">Microwave Oven</text>
  </g>

  <!-- === Connector line === -->
  <line x1="180" y1="155" x2="410" y2="120" stroke="#e63946" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="180" y1="159" x2="410" y2="230" stroke="#e63946" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- === RIGHT: Zoomed-in mesh === -->
  <g transform="translate(410, 30)">
    <rect x="0" y="0" width="260" height="260" rx="8" fill="#2a2a2a" stroke="#e63946" stroke-width="2.5"/>

    <!-- Grid of holes - 5x5 visible -->
    <g>
      <!-- Row 1 -->
      <circle cx="50" cy="50" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="100" cy="50" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="150" cy="50" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="200" cy="50" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <!-- Row 2 -->
      <circle cx="50" cy="100" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="100" cy="100" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="150" cy="100" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="200" cy="100" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <!-- Row 3 -->
      <circle cx="50" cy="150" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="100" cy="150" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="150" cy="150" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="200" cy="150" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <!-- Row 4 -->
      <circle cx="50" cy="200" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="100" cy="200" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="150" cy="200" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="200" cy="200" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <!-- Row 5 (partial) -->
      <circle cx="50" cy="250" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="100" cy="250" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="150" cy="250" r="16" fill="#555" stroke="#444" stroke-width="1"/>
      <circle cx="200" cy="250" r="16" fill="#555" stroke="#444" stroke-width="1"/>
    </g>

    <!-- Dimension arrow: horizontal spacing -->
    <line x1="100" y1="28" x2="150" y2="28" stroke="#e63946" stroke-width="2" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
    <rect x="107" y="12" width="36" height="16" rx="3" fill="#e63946"/>
    <text x="125" y="24" text-anchor="middle" font-size="10" fill="white" font-weight="bold">~1 mm</text>

    <!-- Dimension arrow: hole diameter -->
    <line x1="218" y1="100" x2="218" y2="150" stroke="#4ecdc4" stroke-width="2" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
    <rect x="224" y="114" width="32" height="16" rx="3" fill="#4ecdc4"/>
    <text x="240" y="126" text-anchor="middle" font-size="9" fill="#111" font-weight="bold">d ≈ 1 mm</text>
  </g>

  <!-- Zoom label -->
  <text x="540" y="310" text-anchor="middle" font-size="12" fill="#e63946" font-weight="600">d ≪ λ = 12 cm</text>
  <text x="540" y="325" text-anchor="middle" font-size="11" fill="#666">Grid spacing vs. microwave wavelength</text>
</svg>